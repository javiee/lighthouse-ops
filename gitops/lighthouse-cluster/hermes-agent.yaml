---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: GitRepository
metadata:
  name: hermes-agent-branch
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/javiee/lighthouse-ops.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hermes-agent
  namespace: flux-system
spec:
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: hermes-agent-branch
  path: ./gitops/apps/hermes-agent
  prune: true
  wait: true
  timeout: 5m0s
