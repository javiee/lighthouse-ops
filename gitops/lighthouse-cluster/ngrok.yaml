---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: ngrok-branch
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/javiee/lighthouse-ops.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ngrok
  namespace: flux-system
spec:
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: ngrok-branch
  path: ./gitops/apps/ngrok
  prune: true
  wait: true
  timeout: 5m0s
  dependsOn:
    - name: base-infra
