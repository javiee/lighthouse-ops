---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hermes-agent
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/apps/hermes-agent
  prune: true
  wait: true
  timeout: 5m0s
  dependsOn:
    - name: base-infra
