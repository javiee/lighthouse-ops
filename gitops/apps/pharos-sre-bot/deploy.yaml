---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmChart
metadata:
  name: pharos-sre-bot
  namespace: flux-system
spec:
  interval: 1m
  chart: chart/pharos-sre-bot
  sourceRef:
    kind: GitRepository
    name: pharos-sre-bot
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pharos-sre-bot
  namespace: monitoring
spec:
  interval: 1m
  chartRef:
    kind: HelmChart
    name: pharos-sre-bot
    namespace: flux-system
  install:
    remediation:
      retries: 0
  upgrade:
    remediation:
      retries: 0
  values:
    image:
      repository: ghcr.io/javiee/pharos-sre-bot
      tag: "0.0.1"        
      pullPolicy: Always

    # Pin to the lab node that has the GPU/LLM reachable, matching hermes-agent.
    nodeSelector:
      kubernetes.io/hostname: lh-satellite

    agent:
      # Ingest the chart's bundled runbooks/ into Qdrant at container start (PoC).
      ingestOnStart: true
      env:
        LOG_LEVEL: "INFO"
        MODEL: "Qwen3.6-35B-A3B-MTP-UD-Q4_K_XL"
        MAX_STEPS: "6"
        COLLECTION_NAME: "runbooks"
        # Local llama-swap endpoint on the LAN (no auth -> LLM_API_KEY is a dummy).
        LLM_BASE_URL: "http://192.168.10.127:9090/v1"
        LLM_API_KEY: "sk-no-key-required"
        GRAFANA_PROMETHEUS_UID: "prometheus"

    # Mount the chart-bundled runbooks (chart/pharos-sre-bot/runbooks/*.md) at /runbooks.
    runbooks:
      enabled: true
      mountPath: /runbooks

    # In-pod vector DB sidecar.
    qdrant:
      enabled: true
      persistence:
        enabled: true
        size: 5Gi
        
    kubernetesMcp:
      enabled: true
      image:
        tag: "v0.0.63"      # ghcr.io/containers/kubernetes-mcp-server tags are v-prefixed
      readOnly: true
      disableDestructive: true
      rbac:
        create: true
        scope: cluster      # cluster-wide read-only; set to "namespace" to restrict

    grafanaMcp:
      enabled: true
      image:
        tag: "latest"       # mcp/grafana publishes only :latest on Docker Hub
        pullPolicy: Always  # so the floating tag is re-pulled
      grafanaUrl: "http://kube-prometheus-stack-grafana.monitoring.svc"
      extraEnv:
        - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
          valueFrom:
            secretKeyRef:
              name: pharos-grafana-token
              key: grafana-service-account-token
