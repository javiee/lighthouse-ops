apiVersion: v1
kind: Namespace
metadata:
  name: hermes-agent
  labels:
    hermes/agent: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: hermes-agent-secrets
  namespace: hermes-agent
type: Opaque
stringData:
  OPENROUTER_API_KEY: "CHANGE_ME"
  # ANTHROPIC_API_KEY: "CHANGE_ME"
  # TELEGRAM_BOT_TOKEN: "CHANGE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: hermes-agent
  labels:
    app: hermes-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-agent
  template:
    metadata:
      labels:
        app: hermes-agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      nodeSelector:
        hermes/schedule: satellite
      containers:
        - name: hermes-agent
          image: ghcr.io/nousresearch/hermes-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 12101
              name: gateway
              protocol: TCP
          env:
            - name: HERMES_HOME
              value: /root/.hermes
          envFrom:
            - secretRef:
                name: hermes-agent-secrets
          volumeMounts:
            - name: config
              mountPath: /root/.hermes/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: state
              mountPath: /root/.hermes
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: config
          configMap:
            name: hermes-agent-config
        - name: state
          persistentVolumeClaim:
            claimName: hermes-agent-state
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-agent
  namespace: hermes-agent
spec:
  type: ClusterIP
  ports:
    - port: 12101
      targetPort: 12101
      protocol: TCP
      name: gateway
  selector:
    app: hermes-agent
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-agent-config
  namespace: hermes-agent
data:
  config.yaml: |
    model:
      default: "openrouter/meta-llama/llama-3.1-8b-instruct"
    terminal:
      backend: local
      cwd: "/workspace"
      timeout: 180
    compression:
      enabled: true
      threshold: 0.85
    memory:
      memory_enabled: true
      user_profile_enabled: true
    agent:
      max_turns: 90
    # MCP servers:
    # mcp_servers:
    #   filesystem:
    #     command: "npx"
    #     args: ["-y", "@modelcontextprotocol/server-filesystem", "/data/workspace"]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-agent-state
  namespace: hermes-agent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
