---
apiVersion: v1
kind: Namespace
metadata:
  name: hermes-agent
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: GitRepository
metadata:
  name: hermes-agent-chart
  namespace: flux-system
spec:
  interval: 30m
  url: https://github.com/javiee/hermes-agent-helm-chart
  ref:
    branch: main
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmChart
metadata:
  name: hermes-agent
  namespace: flux-system
spec:
  interval: 30m
  chart: ./
  sourceRef:
    kind: GitRepository
    name: hermes-agent-chart
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes-agent
  namespace: hermes-agent
spec:
  interval: 5m
  chartRef:
    kind: HelmChart
    name: hermes-agent
    namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    persistence:
      enabled: true
      size: 10Gi

    nodeSelector:
      kubernetes.io/hostname: lh-satellite

    image:
      repository: mirror.gcr.io/nousresearch/hermes-agent
      tag: v2026.5.29.2
      pullPolicy: Always

    env:
      S6_VERBOSITY: "0"
      S6_BEHAVIOUR_IF_STAGE2_FAILS: "0"
      S6_CMD_WAIT_FOR_SERVICES_MAXTIME: "30000"
      S6_KEEP_ENV: "1"

    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault

    extraVolumes:
      - name: run
        emptyDir: {}

    extraVolumeMounts:
      - name: run
        mountPath: /run

    extraInitContainers:
      - name: fix-run-perms
        image: busybox:latest
        command: ["sh", "-c", "chown -R 1000:1000 /run"]
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        volumeMounts:
          - name: run
            mountPath: /run

    resources:
      limits:
        cpu: "2"
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 1Gi
