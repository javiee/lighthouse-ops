---
apiVersion: v1
kind: Namespace
metadata:
  name: hermes-agent
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: GitRepository
metadata:
  name: hermes-agent-chart
  namespace: flux-system
spec:
  interval: 30m
  url: https://github.com/javiee/hermes-agent-helm-chart
  ref:
    branch: main
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmChart
metadata:
  name: hermes-agent
  namespace: flux-system
spec:
  interval: 30m
  chart: ./
  sourceRef:
    kind: GitRepository
    name: hermes-agent-chart
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes-agent
  namespace: hermes-agent
spec:
  interval: 5m
  chartRef:
    kind: HelmChart
    name: hermes-agent
    namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    replicaCount: 1

    image:
      repository: public.ecr.aws/docker.io/nousresearch/hermes-agent
      tag: v2026.5.29.2
      pullPolicy: Always

    persistence:
      enabled: true
      size: 10Gi
      mountPath: /root/.hermes

    nodeSelector:
      kubernetes.io/hostname: lh-satellite

    resources:
      limits:
        cpu: "2"
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 1Gi

    config:
      values:
        model:
          default: "Qwen3.6-35B-A3B-APEX-I-Balanced"
          provider: openai
          base_url: http://192.168.10.127:9090
        terminal:
          backend: local
          cwd: /workspace
          timeout: 180
        compression:
          enabled: true
          threshold: 0.85
        memory:
          memory_enabled: true
          user_profile_enabled: true
        agent:
          max_turns: 90

    secrets: {}
    # secrets:
    #   OPENROUTER_API_KEY: "sk-or-your-key"

    strategy:
      type: Recreate
