---
apiVersion: v1
kind: Namespace
metadata:
  name: hermes-agent
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmChart
metadata:
  name: hermes-agent
  namespace: flux-system
spec:
  interval: 30m
  chart: ./charts/hermes-agent
  sourceRef:
    kind: GitRepository
    name: hermes-agent-branch
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes-agent
  namespace: hermes-agent
spec:
  interval: 5m
  chartRef:
    kind: HelmChart
    name: hermes-agent
    namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    image:
      repository: mirror.gcr.io/nousresearch/hermes-agent
      tag: v2026.5.29.2
      pullPolicy: Always

    nodeSelector:
      kubernetes.io/hostname: lh-satellite

    env:
      HERMES_DASHBOARD: "1"
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_KEY: "change-me-in-production"

    config:
      enabled: true
      overwrite: true
      values: |
        model:
          default: "Qwen3.6-35B-APEX-I-Balanced"
          provider: openai
          base_url: http://localhost:9090
        terminal:
          backend: local
          cwd: /workspace
          timeout: 180
        compression:
          enabled: true
          threshold: 0.85
        agent:
          max_turns: 90
