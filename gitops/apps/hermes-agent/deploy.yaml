---
apiVersion: v1
kind: Namespace
metadata:
  name: hermes-agent
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmChart
metadata:
  name: hermes-agent
  namespace: flux-system
spec:
  interval: 1m
  chart: ./charts/hermes-agent
  sourceRef:
    kind: GitRepository
    name: hermes-agent-branch
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes-agent
  namespace: hermes-agent
spec:
  interval: 1m
  chartRef:
    kind: HelmChart
    name: hermes-agent
    namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 0
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 0
  values:
    image:
      repository: mirror.gcr.io/nousresearch/hermes-agent
      tag: v2026.5.29.2
      pullPolicy: Always

    nodeSelector:
      kubernetes.io/hostname: lh-satellite

    env:
      HERMES_DASHBOARD: "1"
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_KEY: "change-me-in-production"

    # To configure the model, exec into the pod and edit /opt/data/config.yaml:
    # kubectl exec -it hermes-agent-xxxx -n hermes-agent -- cat << 'EOF' > /opt/data/config.yaml
    # model:
    #   default: "Qwen3.6-35B-APEX-I-Balanced"
    #   provider: openai
    #   base_url: http://localhost:9090
    # terminal:
    #   backend: local
    #   cwd: /workspace
    #   timeout: 180
    # compression:
    #   enabled: true
    #   threshold: 0.85
    # agent:
    #   max_turns: 90
    # EOF
