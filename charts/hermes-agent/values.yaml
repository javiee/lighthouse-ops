image:
  repository: mirror.gcr.io/nousresearch/hermes-agent
  tag: v2026.5.29.2
  pullPolicy: Always

replicaCount: 1

args:
  - gateway
  - run

env:
  HERMES_DASHBOARD: "1"
  HERMES_DASHBOARD_HOST: "0.0.0.0"
  HERMES_DASHBOARD_INSECURE: "1"
  API_SERVER_ENABLED: "true"
  API_SERVER_HOST: "0.0.0.0"
  API_SERVER_KEY: "change-me-in-production"
  WEBHOOK_ENABLED: "true"
  WEBHOOK_PORT: "8644"

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

service:
  type: ClusterIP
  ports:
    api: 8642
    dashboard: 9119
    webhooks: 8644

ingress:
  enabled: false
  # Example ingress:
  # enabled: true
  # className: nginx
  # hosts:
  #   - host: hermes.local
  #     paths:
  #       - path: /
  #         pathType: Prefix

nodeSelector: {}

tolerations: []

affinity: {}
