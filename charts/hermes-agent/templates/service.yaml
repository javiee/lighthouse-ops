apiVersion: v1
kind: Service
metadata:
  name: {{ include "hermes-agent.fullname" . }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.ports.api }}
      targetPort: api
      protocol: TCP
      name: api
    {{- if .Values.env.HERMES_DASHBOARD }}
    - port: {{ .Values.service.ports.dashboard }}
      targetPort: dashboard
      protocol: TCP
      name: dashboard
    {{- end }}
  selector:
    {{- include "hermes-agent.selectorLabels" . | nindent 4 }}
