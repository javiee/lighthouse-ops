apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hermes-agent.fullname" . }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hermes-agent.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "hermes-agent.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
      {{- if .Values.config.enabled }}
      initContainers:
        - name: bootstrap-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              set -eu
              mkdir -p /opt/data/home
              if [ -f /bootstrap/config.yaml ]; then
                cp /bootstrap/config.yaml /opt/data/config.yaml
              fi
              if [ -f /bootstrap/SOUL.md ]; then
                cp /bootstrap/SOUL.md /opt/data/SOUL.md
              fi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: bootstrap
              mountPath: /bootstrap
              readOnly: true
      {{- end }}
      containers:
        - name: hermes-agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.command | nindent 12 }}
          env:
            - name: HERMES_HOME
              value: /opt/data
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          ports:
            - name: api
              containerPort: {{ .Values.service.ports.api }}
              protocol: TCP
            {{- if .Values.env.HERMES_DASHBOARD }}
            - name: dashboard
              containerPort: {{ .Values.service.ports.dashboard }}
              protocol: TCP
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: dshm
              mountPath: /dev/shm
            {{- if .Values.config.enabled }}
            - name: bootstrap
              mountPath: /bootstrap
              readOnly: true
            {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "hermes-agent.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        {{- if .Values.config.enabled }}
        - name: bootstrap
          configMap:
            name: {{ include "hermes-agent.fullname" . }}-config
        {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
