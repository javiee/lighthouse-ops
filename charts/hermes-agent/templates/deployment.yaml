apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hermes-agent.fullname" . }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hermes-agent.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "hermes-agent.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: hermes-agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- toYaml .Values.args | nindent 12 }}
          env:
            - name: HERMES_HOME
              value: /opt/data
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.secretEnv }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $value.secretKeyRef.name }}
                  key: {{ $value.secretKeyRef.key }}
            {{- end }}
            {{- if .Values.telegram }}
            {{- if .Values.telegram.allowed_users }}
            - name: TELEGRAM_ALLOWED_USERS
              value: {{ .Values.telegram.allowed_users | quote }}
            {{- end }}
            {{- if .Values.telegram.home_channel }}
            - name: TELEGRAM_HOME_CHANNEL
              value: {{ .Values.telegram.home_channel | quote }}
            {{- end }}
            {{- end }}
          ports:
            - name: api
              containerPort: {{ .Values.service.ports.api }}
              protocol: TCP
            {{- if .Values.env.HERMES_DASHBOARD }}
            - name: dashboard
              containerPort: {{ .Values.service.ports.dashboard }}
              protocol: TCP
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "hermes-agent.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
